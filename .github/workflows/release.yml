name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ github.ref_name }} --generate-notes --title ${{ github.ref_name }}

  build:
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4
      - name: Install system deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update -q && sudo apt-get install -y libxkbcommon-dev libwayland-dev libgtk-3-dev libxdo-dev
      - run: rustup target add ${{ matrix.target }}
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: release-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: release-${{ matrix.target }}-
      - run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package & upload
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          NAME="textedit-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir "$NAME" && cp "target/${{ matrix.target }}/release/textedit" "$NAME/"
          tar czf "$NAME.tar.gz" "$NAME"
          gh release upload ${{ github.ref_name }} "$NAME.tar.gz" --clobber
